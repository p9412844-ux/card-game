<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Memory Match Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <header>
            <h1>Memory Match</h1>
            <div class="score-board">
                <div class="stat-box">Moves: <span id="moves-count">0</span></div>
                <div class="stat-box">Matches: <span id="matches-count">0</span>/8</div>
            </div>
        </header>

        <div class="grid-container" id="game-grid">
            <!-- Cards will be dynamically injected by JavaScript -->
        </div>

        <button id="restart-btn">Restart Game</button>
    </div>


    <script src="script.js"></script>
</body>
</html>
