<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Memory Match Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <header>
            <h1>Memory Match</h1>
            <div class="score-board">
                <div class="stat-box">Moves: <span id="moves-count">0</span></div>
                <div class="stat-box">Matches: <span id="matches-count">0</span>/8</div>
            </div>
        </header>

        <div class="grid-container" id="game-grid">
            <!-- Cards will be dynamically injected by JavaScript -->
        </div>

      <div class="buttons-container">
    <button id="restart-btn">Restart Game</button>
    <button id="preview-btn" title="Preview Cards">👁️ peek</button>
</div>
    </div>
    <!-- Congratulations Pop-up Modal -->
    <div class="modal-overlay" id="win-modal">
        <div class="modal-content">
            <div class="modal-icon">🎉</div>
            <h2>Congratulations!</h2>
            <p>You have successfully matched all the cards!</p>
            <div class="modal-stats">
                <div>Total Moves: <span id="final-moves">0</span></div>
            </div>
            <button id="modal-new-game-btn">Play New Game</button>
        </div>
    </div>


    <script src="script.js"></script>
</body>
</html>
